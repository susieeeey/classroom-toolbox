<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2563eb">
  <meta name="description" content="小学课堂互动工具箱：打开即用的随机点名、分组、课堂积分和奖励工具。">
  <link rel="manifest" href="./manifest.json">
  <title>小学课堂互动工具箱</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #667085;
      --line: #d8dee8;
      --blue: #2563eb;
      --cyan: #0891b2;
      --green: #16a34a;
      --orange: #f97316;
      --red: #dc2626;
      --yellow: #facc15;
      --violet: #7c3aed;
      --shadow: 0 18px 40px rgba(31, 41, 55, .10);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 12%, rgba(37, 99, 235, .16), transparent 24%),
        radial-gradient(circle at 88% 8%, rgba(250, 204, 21, .18), transparent 22%),
        radial-gradient(circle at 82% 86%, rgba(22, 163, 74, .12), transparent 24%),
        linear-gradient(135deg, #f8fbff 0%, #f2f7ff 44%, #fffaf0 100%);
      background-size: 32px 32px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: "";
      position: fixed;
      inset: -18vh -12vw auto auto;
      width: 46vw;
      height: 46vw;
      min-width: 420px;
      min-height: 420px;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      background:
        radial-gradient(circle, rgba(37, 99, 235, .12) 0 18%, transparent 19%),
        radial-gradient(circle at 70% 68%, rgba(249, 115, 22, .12) 0 12%, transparent 13%);
      filter: blur(2px);
      animation: floatGlow 18s ease-in-out infinite alternate;
    }

    body::after {
      inset: auto auto -22vh -12vw;
      background:
        radial-gradient(circle, rgba(8, 145, 178, .11) 0 17%, transparent 18%),
        radial-gradient(circle at 66% 38%, rgba(250, 204, 21, .16) 0 11%, transparent 12%);
      animation-duration: 22s;
      animation-direction: alternate-reverse;
    }

    body.reduce-motion::before,
    body.reduce-motion::after,
    body.reduce-motion * {
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
    }

    button, textarea, input, select {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease, filter .18s ease;
      touch-action: manipulation;
    }

    button:hover { transform: translateY(-2px); }
    button:active { transform: translateY(1px) scale(.98); }
    button:disabled { cursor: not-allowed; opacity: .55; transform: none; }

    .app-shell {
      width: min(1440px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(320px, auto) minmax(280px, 360px);
      align-items: end;
      gap: 20px;
      margin-bottom: 22px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1;
      letter-spacing: 0;
    }

    .title-wrap p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 18px;
    }

    .usage-tips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      color: #1e3a8a;
      font-size: 14px;
      font-weight: 800;
    }

    .usage-tips span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border: 1px solid rgba(37, 99, 235, .18);
      border-radius: 999px;
      background: rgba(239, 246, 255, .92);
    }

    .quick-status {
      display: grid;
      grid-template-columns: repeat(3, minmax(108px, 1fr));
      gap: 10px;
      min-width: 360px;
    }

    .stat {
      background: rgba(255, 255, 255, .82);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: 0 8px 20px rgba(31, 41, 55, .06);
      backdrop-filter: blur(10px);
    }

    .sound-panel {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid rgba(216, 222, 232, .9);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .86);
      box-shadow: 0 10px 28px rgba(31, 41, 55, .08);
      backdrop-filter: blur(12px);
    }

    .sound-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .sound-toggle {
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      font-size: 14px;
      font-weight: 900;
    }

    .sound-toggle.active {
      color: #ffffff;
      border-color: transparent;
      background: var(--blue);
      box-shadow: 0 8px 18px rgba(37, 99, 235, .20);
    }

    .volume-wrap {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .volume-wrap input {
      width: 100%;
      accent-color: var(--blue);
    }

    .audio-tip {
      min-height: 20px;
      color: #9a3412;
      font-size: 12px;
      font-weight: 800;
    }

    .stat b {
      display: block;
      font-size: 30px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(360px, 450px) 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel, .tool-section {
      background: rgba(255, 255, 255, .88);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .roster-panel {
      position: sticky;
      top: 18px;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
    }

    .panel-head h2, .tool-section h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #075985;
      font-weight: 800;
      white-space: nowrap;
    }

    .roster-body {
      padding: 18px 20px 20px;
    }

    .paste-box {
      width: 100%;
      min-height: 210px;
      resize: vertical;
      border: 2px solid #9cc6ff;
      border-radius: var(--radius);
      padding: 16px;
      font-size: 18px;
      line-height: 1.55;
      color: var(--ink);
      background: #ffffff;
      outline: none;
    }

    .paste-box:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .btn {
      min-height: 50px;
      padding: 12px 18px;
      color: white;
      font-weight: 800;
      font-size: 17px;
      box-shadow: 0 10px 18px rgba(31, 41, 55, .12);
    }

    .btn:hover {
      box-shadow: 0 14px 28px rgba(31, 41, 55, .18);
      filter: brightness(1.04);
    }

    .primary { background: var(--blue); }
    .secondary { background: #475467; }
    .success { background: var(--green); }
    .warning { background: var(--orange); }
    .danger { background: var(--red); }
    .cyan { background: var(--cyan); }
    .violet { background: var(--violet); }
    .light-btn {
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: #fff;
      font-weight: 700;
    }

    .switch-row {
      display: grid;
      gap: 10px;
      margin: 14px 0;
    }

    .switch-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fafc;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }

    .switch-line input {
      width: 48px;
      height: 26px;
      accent-color: var(--blue);
    }

    .notice {
      display: none;
      margin: 12px 0 0;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      line-height: 1.45;
      font-weight: 700;
    }

    .notice.show { display: block; }

    .privacy-note {
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid #bbf7d0;
      border-radius: var(--radius);
      background: #f0fdf4;
      color: #166534;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;
    }

    .list-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .student-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 300px;
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcff;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 6px 9px 6px 12px;
      border-radius: 999px;
      background: #eef4ff;
      border: 1px solid #c7d7fe;
      color: #1e3a8a;
      font-weight: 800;
    }

    .chip.hidden {
      background: #f2f4f7;
      border-color: #d0d5dd;
      color: #98a2b3;
      text-decoration: line-through;
    }

    .chip button {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: #ffffff;
      color: #475467;
      font-weight: 900;
      line-height: 1;
    }

    .empty {
      width: 100%;
      color: var(--muted);
      text-align: center;
      padding: 20px 0;
      font-weight: 700;
    }

    .tools {
      display: grid;
      gap: 18px;
    }

    .tool-section {
      padding: 18px;
      animation: sectionIn .48s ease both;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title span {
      color: var(--muted);
      font-weight: 700;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .tool-card {
      min-height: 96px;
      padding: 16px 16px 16px 60px;
      text-align: left;
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .96), rgba(255, 255, 255, .82)),
        radial-gradient(circle at 88% 14%, color-mix(in srgb, var(--accent, var(--blue)) 16%, transparent), transparent 30%);
      color: var(--ink);
      box-shadow: 0 8px 16px rgba(31, 41, 55, .06);
      position: relative;
      overflow: hidden;
    }

    .tool-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 7px;
      height: 100%;
      background: var(--accent, var(--blue));
    }

    .tool-card::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      background: linear-gradient(120deg, transparent 0 30%, rgba(255,255,255,.72) 45%, transparent 62%);
      transform: translateX(-120%);
      transition: opacity .18s ease;
    }

    .tool-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 32px rgba(31, 41, 55, .14);
      border-color: color-mix(in srgb, var(--accent, var(--blue)) 45%, var(--line));
    }

    .tool-card:hover::after {
      opacity: .8;
      animation: sheen 1s ease;
    }

    .tool-icon {
      position: absolute;
      left: 18px;
      top: 18px;
      width: 30px;
      height: 30px;
      border-radius: 9px;
      background:
        radial-gradient(circle at 34% 34%, rgba(255,255,255,.9) 0 18%, transparent 19%),
        var(--accent, var(--blue));
      box-shadow: 0 8px 16px color-mix(in srgb, var(--accent, var(--blue)) 28%, transparent);
      transition: transform .2s ease;
    }

    .tool-card:hover .tool-icon { transform: scale(1.12) rotate(5deg); }

    .tool-card strong {
      display: block;
      font-size: 20px;
      line-height: 1.25;
    }

    .tool-card span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: rgba(15, 23, 42, .45);
      backdrop-filter: blur(8px);
      z-index: 40;
      opacity: 0;
      transition: opacity .22s ease;
    }

    .modal.open {
      display: flex;
      opacity: 1;
      animation: fadeIn .22s ease both;
    }

    .stage {
      width: min(1180px, 100%);
      max-height: calc(100vh - 56px);
      overflow: auto;
      background: #ffffff;
      border-radius: var(--radius);
      box-shadow: 0 30px 80px rgba(15, 23, 42, .28);
      border: 1px solid rgba(255, 255, 255, .6);
      transform-origin: center;
      animation: stageIn .24s cubic-bezier(.17, .67, .18, 1.15) both;
    }

    .stage-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .stage-head h2 {
      margin: 0;
      font-size: 28px;
    }

    .close-btn {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: #f2f4f7;
      color: #344054;
      font-size: 28px;
      line-height: 1;
    }

    .stage-body {
      padding: 24px;
    }

    .stage-result {
      min-height: 290px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 2px dashed #bdd7ff;
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 20% 20%, rgba(250, 204, 21, .18), transparent 24%),
        radial-gradient(circle at 82% 22%, rgba(8, 145, 178, .14), transparent 26%),
        #f8fbff;
      overflow: hidden;
      padding: 26px;
      position: relative;
    }

    .stage-result.flash {
      animation: resultFlash .75s ease;
    }

    .stage-result.spotlight {
      background:
        radial-gradient(circle at 50% 45%, rgba(255, 255, 255, .95) 0 18%, rgba(250, 204, 21, .26) 19% 34%, transparent 35%),
        radial-gradient(circle at 20% 20%, rgba(250, 204, 21, .18), transparent 24%),
        radial-gradient(circle at 82% 22%, rgba(8, 145, 178, .14), transparent 26%),
        #f8fbff;
    }

    .big-name {
      font-size: clamp(56px, 10vw, 138px);
      font-weight: 1000;
      line-height: 1.05;
      color: #0f172a;
      animation: pop .45s ease both;
      word-break: keep-all;
      text-shadow: 0 12px 32px rgba(37, 99, 235, .16);
    }

    .rolling-name {
      letter-spacing: 0;
      filter: blur(.2px);
      animation: quickPulse .18s linear infinite alternate;
    }

    .subline {
      margin-top: 16px;
      color: var(--muted);
      font-size: 22px;
      font-weight: 800;
    }

    .stage-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
    }

    .stage-controls .btn, .stage-controls .light-btn {
      min-width: 150px;
      min-height: 50px;
    }

    .history-box, .config-box {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcff;
    }

    .history-box h3, .config-box h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 34px;
    }

    .history-list span {
      padding: 6px 10px;
      border-radius: 999px;
      background: #ecfdf3;
      color: #027a48;
      font-weight: 800;
    }

    .wheel-wrap {
      display: grid;
      grid-template-columns: minmax(280px, 430px) 1fr;
      gap: 22px;
      align-items: center;
    }

    .wheel {
      width: min(430px, 82vw);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 10px solid #ffffff;
      box-shadow: 0 16px 42px rgba(15, 23, 42, .20);
      display: grid;
      place-items: center;
      background: conic-gradient(#2563eb 0 14%, #f97316 14% 28%, #16a34a 28% 42%, #facc15 42% 56%, #0891b2 56% 70%, #7c3aed 70% 84%, #ef4444 84% 100%);
      transition: transform 4.2s cubic-bezier(.12, .72, .08, 1);
      position: relative;
    }

    .wheel.spinning {
      box-shadow: 0 18px 50px rgba(37, 99, 235, .26), 0 0 0 10px rgba(250, 204, 21, .12);
    }

    .wheel-labels {
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      pointer-events: none;
    }

    .wheel-name {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 46%;
      transform-origin: 0 0;
      color: #ffffff;
      font-weight: 1000;
      text-shadow: 0 2px 8px rgba(0,0,0,.35);
      font-size: 13px;
      text-align: right;
      opacity: .95;
    }

    .wheel-name.used { opacity: .28; }

    .wheel::after {
      content: "";
      position: absolute;
      top: -22px;
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 38px solid #111827;
    }

    .wheel-center {
      width: 42%;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      padding: 18px;
      background: #ffffff;
      color: #111827;
      font-size: clamp(26px, 5vw, 48px);
      font-weight: 1000;
      text-align: center;
      box-shadow: inset 0 0 0 2px #e5e7eb;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      justify-items: center;
    }

    .flip-card {
      width: 160px;
      height: 210px;
      min-height: 210px;
      perspective: 1000px;
      border: 0;
      background: transparent;
      padding: 0;
    }

    .flip-card:hover .flip-inner,
    .flip-card:hover .flip-card-inner {
      transform: translateY(-6px) rotateX(4deg);
      filter: brightness(1.03);
    }

    .flip-inner,
    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 210px;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.17, .67, .18, 1.12), filter .2s ease;
    }

    .flip-card.flipped .flip-inner,
    .flip-card.is-flipped .flip-card-inner { transform: rotateY(180deg); }
    .cards-grid.has-selection .flip-card:not(.flipped):not(.is-flipped) { opacity: .62; }
    .flip-card.flipped .flip-back,
    .flip-card.is-flipped .flip-card-back {
      box-shadow: 0 0 0 4px rgba(250, 204, 21, .35), 0 14px 26px rgba(249, 115, 22, .18);
    }

    .flip-face,
    .flip-card-front,
    .flip-card-back {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      padding: 12px;
      font-size: 22px;
      font-weight: 1000;
      text-align: center;
      overflow: hidden;
    }

    .flip-front,
    .flip-card-front {
      background: #1d4ed8;
      color: #ffffff;
    }

    .flip-back,
    .flip-card-back {
      background: #ffffff;
      border: 2px solid #fdba74;
      color: #1f2937;
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
    }

    .student-name {
      display: block;
      color: #111827;
      font-size: clamp(24px, 3vw, 42px);
      font-weight: 800;
      line-height: 1.2;
      text-align: center;
      opacity: 1;
      visibility: visible;
      z-index: 10;
      padding: 12px;
      word-break: break-all;
      overflow-wrap: anywhere;
    }

    .flip-result {
      display: none;
      margin-top: 24px;
      text-align: center;
    }

    .flip-result.show {
      display: block;
    }

    .flip-result-label {
      color: var(--muted);
      font-size: 18px;
      font-weight: 900;
    }

    .flip-result-name {
      font-size: clamp(40px, 7vw, 88px);
      font-weight: 900;
      line-height: 1.15;
      color: #111827;
      word-break: break-all;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      align-items: end;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-weight: 800;
    }

    .field input, .field select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px 10px;
      background: #ffffff;
    }

    .timer-display {
      font-size: clamp(82px, 16vw, 190px);
      font-weight: 1000;
      line-height: 1;
      color: #111827;
      font-variant-numeric: tabular-nums;
    }

    .timer-display.danger-time {
      color: var(--red);
      animation: shake .25s linear infinite;
    }

    .group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .group-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      overflow: hidden;
      box-shadow: 0 8px 16px rgba(31, 41, 55, .06);
      transition: transform .24s ease, box-shadow .24s ease, border-color .24s ease;
      animation: cardPop .38s ease both;
    }

    .group-card.glow {
      animation: scoreGlow .6s ease;
    }

    .group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      font-weight: 1000;
      font-size: 20px;
    }

    .score {
      font-size: 30px;
      color: var(--blue);
      font-variant-numeric: tabular-nums;
      transition: transform .2s ease;
    }

    .score.bump { animation: scoreBump .42s ease; }

    .group-members {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 74px;
      padding: 12px;
    }

    .group-member {
      padding: 6px 9px;
      border-radius: 999px;
      background: #eef4ff;
      color: #1e3a8a;
      font-weight: 800;
    }

    .score-controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(58px, 1fr));
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--line);
    }

    .score-controls button {
      min-height: 38px;
      background: #f2f4f7;
      color: var(--ink);
      font-weight: 900;
    }

    .leaderboard {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 58px 1fr 88px;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      font-size: 22px;
      font-weight: 1000;
      transition: transform .24s ease, box-shadow .24s ease;
      animation: slideUp .28s ease both;
    }

    .rank-row .rank {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 999px;
      color: #ffffff;
      background: var(--blue);
    }

    .student-score-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .student-score-row strong {
      font-size: 20px;
    }

    .score-buttons {
      display: flex;
      gap: 8px;
    }

    .score-buttons button {
      min-width: 38px;
      min-height: 34px;
      background: #f2f4f7;
      color: var(--ink);
      font-weight: 900;
    }

    .message {
      padding: 18px;
      border-radius: var(--radius);
      background: #fef3c7;
      color: #92400e;
      font-size: 24px;
      font-weight: 900;
      text-align: center;
    }

    .audio-overlay {
      position: fixed;
      right: 20px;
      bottom: 18px;
      max-width: min(420px, calc(100vw - 40px));
      padding: 10px 12px;
      border-radius: var(--radius);
      background: rgba(255, 247, 237, .94);
      border: 1px solid #fed7aa;
      color: #9a3412;
      font-weight: 900;
      box-shadow: 0 14px 30px rgba(31, 41, 55, .12);
      z-index: 50;
      display: none;
    }

    .audio-overlay.show { display: block; animation: slideUp .24s ease both; }

    .particle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      left: 50%;
      top: 50%;
      background: var(--pcolor, #facc15);
      pointer-events: none;
      animation: particleFly .9s ease-out forwards;
    }

    .floating-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 3px;
      background: rgba(37, 99, 235, .16);
      pointer-events: none;
      z-index: -1;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .number-records {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .number-records span {
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef4ff;
      color: #1e3a8a;
      font-weight: 900;
    }

    .timer-ring-wrap {
      position: relative;
      display: grid;
      place-items: center;
      width: min(360px, 76vw);
      aspect-ratio: 1;
      margin: 0 auto;
    }

    .timer-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(var(--blue) var(--progress, 100%), #e5e7eb 0);
      mask: radial-gradient(circle, transparent 58%, #000 59%);
    }

    .choice-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .choice-row button {
      min-height: 40px;
      padding: 8px 12px;
      background: #eef4ff;
      color: #1e3a8a;
      font-weight: 900;
    }

    .flower-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .flower-name {
      padding: 12px 8px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #ffffff;
      text-align: center;
      font-weight: 1000;
      transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
    }

    .flower-name.active {
      background: #fef3c7;
      box-shadow: 0 0 0 4px rgba(250, 204, 21, .28), 0 14px 26px rgba(249, 115, 22, .18);
      transform: scale(1.08);
    }

    .bomb-device {
      display: grid;
      place-items: center;
      width: min(280px, 70vw);
      aspect-ratio: 1;
      margin: 0 auto 18px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 42%, #ffffff 0 30%, transparent 31%),
        radial-gradient(circle, #fde68a 0 48%, #f97316 49% 70%, #fff7ed 71%);
      border: 10px solid #ffffff;
      box-shadow: 0 18px 42px rgba(249, 115, 22, .20);
      color: #9a3412;
      font-size: clamp(54px, 10vw, 112px);
      font-weight: 1000;
    }

    .leader-mark {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 9px;
      border-radius: 999px;
      background: #fef3c7;
      color: #92400e;
      box-shadow: 0 0 0 3px rgba(250, 204, 21, .24);
    }

    .score-pop {
      position: absolute;
      right: 14px;
      top: 46px;
      color: var(--green);
      font-size: 24px;
      font-weight: 1000;
      animation: scorePop .7s ease forwards;
      pointer-events: none;
    }

    .award-mark {
      font-size: clamp(48px, 8vw, 96px);
      line-height: 1;
      margin-bottom: 8px;
      color: #f59e0b;
      text-shadow: 0 10px 22px rgba(245, 158, 11, .22);
    }

    .roster-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .roster-summary-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      text-align: center;
      box-shadow: 0 8px 16px rgba(31, 41, 55, .06);
    }

    .roster-summary-card b {
      display: block;
      font-size: 28px;
      line-height: 1;
    }

    .roster-summary-card span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .roster-manager-list {
      display: grid;
      gap: 8px;
      max-height: 52vh;
      overflow: auto;
      margin-top: 12px;
    }

    .roster-row, .score-row {
      display: grid;
      grid-template-columns: minmax(90px, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .roster-row.paused {
      opacity: .62;
      background: #f2f4f7;
    }

    .row-actions, .score-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .mini-btn {
      min-height: 32px;
      padding: 6px 9px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .score-dock {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 25;
      width: min(380px, calc(100vw - 36px));
      max-height: min(300px, 42vh);
      pointer-events: none;
    }

    .score-dock-tab {
      min-height: 54px;
      padding: 12px 18px;
      border-radius: var(--radius);
      color: #ffffff;
      background: linear-gradient(135deg, #2563eb, #0891b2);
      font-size: 18px;
      font-weight: 1000;
      box-shadow: 0 16px 32px rgba(37, 99, 235, .24);
      pointer-events: auto;
    }

    .score-dock-panel {
      display: block;
      max-height: min(300px, 42vh);
      overflow: hidden;
      border: 1px solid rgba(216, 222, 232, .92);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 20px 52px rgba(15, 23, 42, .22);
      backdrop-filter: blur(12px);
      pointer-events: auto;
      animation: stageIn .2s ease both;
    }

    .score-dock.collapsed {
      width: auto;
    }

    .score-dock.collapsed .score-dock-panel {
      display: none;
    }

    .score-dock:not(.collapsed) .score-dock-tab {
      display: none;
    }

    .score-dock-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .score-dock-head h2 {
      margin: 0;
      font-size: 22px;
    }

    .score-dock-body {
      display: grid;
      gap: 10px;
      max-height: calc(min(300px, 42vh) - 58px);
      overflow: auto;
      padding: 12px;
    }

    .score-search, .score-custom-row input, .roster-search {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px 10px;
      background: #ffffff;
    }

    .score-mode-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .score-custom-row {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 8px;
      align-items: center;
    }

    .score-list {
      display: grid;
      gap: 8px;
    }

    .score-row.highlight {
      animation: scoreGlow .7s ease;
      border-color: #facc15;
    }

    .score-name strong {
      display: block;
      font-size: 17px;
    }

    .score-name span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .score-dock-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .quick-score-box {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .84);
    }

    .quick-score-box h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .quick-score-box.done {
      border-color: #86efac;
      background: #f0fdf4;
    }

    .rank-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .rank-options button {
      min-height: 36px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      background: #ffffff;
      font-weight: 900;
    }

    .magic-area {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .magic-slip {
      min-height: 132px;
      border-radius: var(--radius);
      border: 1px solid #d8b4fe;
      background:
        linear-gradient(160deg, #ffffff 0 54%, #f5f3ff 55%),
        radial-gradient(circle at 22% 20%, rgba(124, 58, 237, .14), transparent 32%);
      box-shadow: 0 12px 24px rgba(124, 58, 237, .12);
      display: grid;
      place-items: center;
      color: #5b21b6;
      font-size: 24px;
      font-weight: 1000;
      position: relative;
      overflow: hidden;
    }

    .magic-slip.shaking {
      animation: magicShake .18s ease-in-out infinite alternate;
    }

    .magic-slip.chosen {
      background: #fff7ed;
      color: #9a3412;
      border-color: #fdba74;
      box-shadow: 0 0 0 5px rgba(250, 204, 21, .28), 0 18px 34px rgba(249, 115, 22, .16);
      animation: pop .45s ease both;
    }

    @keyframes magicShake {
      from { transform: translateY(0) rotate(-1.5deg); }
      to { transform: translateY(-8px) rotate(1.5deg); }
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(.7); }
      70% { transform: scale(1.08); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes floatGlow {
      from { transform: translate3d(0, 0, 0) rotate(0deg); }
      to { transform: translate3d(-30px, 24px, 0) rotate(12deg); }
    }

    @keyframes drift {
      from { transform: translateY(0) rotate(0deg); opacity: .45; }
      to { transform: translateY(-36px) rotate(18deg); opacity: .75; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes stageIn {
      from { opacity: 0; transform: translateY(24px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes sectionIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes sheen {
      from { transform: translateX(-120%); }
      to { transform: translateX(120%); }
    }

    @keyframes resultFlash {
      0%, 100% { box-shadow: none; }
      45% { box-shadow: 0 0 0 8px rgba(250, 204, 21, .26), 0 0 60px rgba(37, 99, 235, .22); }
    }

    @keyframes quickPulse {
      from { transform: scale(1); }
      to { transform: scale(1.015); }
    }

    @keyframes particleFly {
      from { opacity: 1; transform: translate(-50%, -50%) scale(.8) rotate(0deg); }
      to { opacity: 0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.1) rotate(220deg); }
    }

    @keyframes cardPop {
      from { opacity: 0; transform: translateY(16px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes scoreGlow {
      0%, 100% { box-shadow: 0 8px 16px rgba(31, 41, 55, .06); }
      45% { box-shadow: 0 0 0 4px rgba(250, 204, 21, .30), 0 18px 34px rgba(37, 99, 235, .16); }
    }

    @keyframes scoreBump {
      0% { transform: scale(1); }
      50% { transform: scale(1.22); }
      100% { transform: scale(1); }
    }

    @keyframes scorePop {
      from { opacity: 1; transform: translateY(8px) scale(.9); }
      to { opacity: 0; transform: translateY(-28px) scale(1.12); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .pulse {
      animation: pulse .7s ease infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); filter: brightness(1); }
      to { transform: scale(1.04); filter: brightness(1.06); }
    }

    @media (max-width: 1060px) {
      .topbar {
        align-items: stretch;
        grid-template-columns: 1fr;
      }
      .quick-status, .sound-panel { min-width: 0; }
      .layout { grid-template-columns: 1fr; }
      .roster-panel { position: static; }
      .tool-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .wheel-wrap { grid-template-columns: 1fr; }
      .wheel { justify-self: center; }
    }

    @media (max-width: 640px) {
      .app-shell {
        width: min(100% - 22px, 1440px);
        padding-top: 18px;
      }
      .quick-status, .actions, .tool-grid, .sound-row {
        grid-template-columns: 1fr;
      }
      .modal { padding: 10px; }
      .stage-body { padding: 16px; }
      .stage-result { min-height: 240px; }
      .rank-row { grid-template-columns: 48px 1fr 72px; font-size: 18px; }
      .roster-summary { grid-template-columns: 1fr; }
      .score-dock {
        left: 10px;
        right: 10px;
        bottom: 10px;
        width: auto;
      }
      .score-dock-panel {
        max-height: 42vh;
      }
      .score-dock-actions, .score-custom-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="title-wrap">
        <h1>小学课堂互动工具箱</h1>
        <p>粘贴一次名单，整节课点名、分组、PK、奖励都能直接用。</p>
        <div class="usage-tips" aria-label="使用步骤">
          <span>1. 粘贴名单</span>
          <span>2. 导入名单</span>
          <span>3. 选择游戏</span>
          <span>4. 开始互动</span>
          <span>无需登录，打开即用</span>
        </div>
      </div>
      <div class="quick-status" aria-label="课堂状态">
        <div class="stat"><b id="statTotal">0</b><span>名单人数</span></div>
        <div class="stat"><b id="statActive">0</b><span>参与人数</span></div>
        <div class="stat"><b id="statDrawn">0</b><span>已抽记录</span></div>
      </div>
      <div class="sound-panel" aria-label="课堂音效控制">
        <div class="sound-row">
          <button class="sound-toggle" id="soundToggle" type="button">音效 开</button>
          <button class="sound-toggle" id="musicToggle" type="button">音乐 开</button>
          <button class="sound-toggle" id="muteToggle" type="button">静音 关</button>
        </div>
        <div class="sound-row">
          <button class="sound-toggle" id="motionToggle" type="button">动画 标准</button>
          <button class="sound-toggle" id="boostToggle" type="button">课堂扩音 关</button>
          <button class="sound-toggle" id="enableAudioBtn" type="button">启用课堂音效</button>
        </div>
        <div class="sound-row">
          <button class="sound-toggle" id="testSoundBtn" type="button">测试音效</button>
          <button class="sound-toggle" id="resetAudioBtn" type="button">恢复默认音效</button>
        </div>
        <button class="sound-toggle" id="stopAudioBtn" type="button">停止音乐</button>
        <label class="volume-wrap">
          <span>音量</span>
          <input id="volumeSlider" type="range" min="0" max="100" value="78">
          <span id="volumeValue">78%</span>
        </label>
        <div class="audio-tip" id="audioTip">点击页面任意位置启用课堂音效。</div>
      </div>
    </header>

    <div class="layout">
      <section class="panel roster-panel" aria-labelledby="rosterTitle">
        <div class="panel-head">
          <h2 id="rosterTitle">学生名单粘贴区</h2>
          <span class="badge" id="savedBadge">本地保存</span>
        </div>
        <div class="roster-body">
          <textarea class="paste-box" id="rosterInput" placeholder="可直接粘贴：
张三
2、李四
3）王五
赵六、钱七、孙八"></textarea>
          <div class="actions">
            <button class="btn primary" id="importBtn">导入名单</button>
            <button class="btn secondary" id="clearBtn">清空名单</button>
          </div>
          <div class="notice" id="duplicateNotice"></div>
          <div class="privacy-note">学生名单与课堂数据仅保存在当前设备浏览器中，不会上传至服务器。</div>

          <div class="switch-row">
            <label class="switch-line">
              <span>允许重复抽取</span>
              <input type="checkbox" id="allowRepeat">
            </label>
          </div>

          <div class="list-tools">
            <button class="light-btn" id="resetHistoryBtn">重置本节课抽取记录</button>
            <button class="light-btn" id="showAllBtn">恢复全部参与</button>
            <button class="light-btn" id="clearLocalDataBtn">一键清除本机数据</button>
          </div>
          <div class="student-list" id="studentList">
            <div class="empty">还没有导入名单</div>
          </div>
        </div>
      </section>

      <section class="tools" aria-label="课堂工具">
        <div class="tool-section">
          <div class="section-title">
            <h2>点名类</h2>
            <span>抽人、号码、转盘、卡牌</span>
          </div>

    const audioManager = {
      ctx: null,
      unlocked: false,
      currentLoop: null,
      loopTimer: null,
      audioCache: {},
      init() {
        this.applySettings();
      },
      async unlock() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) {
          els.audioTip.textContent = "当前浏览器不支持课堂音效。";
          return false;
        }
        try {
          this.ctx = this.ctx || new AudioContext();
          if (this.ctx.state === "suspended") await this.ctx.resume();
          this.unlocked = this.ctx.state === "running";
          if (this.unlocked) {
            els.audioTip.textContent = "课堂音效已启用。";
            els.audioOverlay.classList.remove("show");
            return true;
          }
          els.audioTip.textContent = `音频尚未启用，AudioContext状态：${this.ctx.state}`;
          return false;
        } catch (error) {
          console.error("音频启用失败：", error);
          els.audioTip.textContent = "音频启用失败，请再次点击“启用课堂音效”。";
          return false;
        }
      },
      gainValue(multiplier = 1) {
        if (state.audio.muted) return 0;
        const isButtonLike = multiplier <= 0.14;
        const boost = state.audio.classroomBoost ? (isButtonLike ? 1.12 : 1.45) : 1;
        const value = state.audio.volume * multiplier * 1.55 * boost;
        return Math.max(0, Math.min(0.95, value));
      },
      canPlay(kind) {
        if (state.audio.muted) return false;
        if (kind === "music") return state.audio.musicEnabled;
        return state.audio.soundEnabled;
      },
      ensureUnlocked() {
        if (this.unlocked) return true;
        els.audioOverlay.classList.add("show");
        els.audioTip.textContent = "请先点击“启用课堂音效”。";
        return false;
      },
      tone(freq, duration = 0.12, type = "sine", gain = 0.18) {
        if (!this.canPlay("sound") || !this.ensureUnlocked() || !this.ctx) return;
        try {
          const now = this.ctx.currentTime;
          const osc = this.ctx.createOscillator();
          const amp = this.ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, now);
          amp.gain.setValueAtTime(0.0001, now);
          amp.gain.exponentialRampToValueAtTime(Math.max(0.0001, this.gainValue(gain)), now + 0.02);
          amp.gain.exponentialRampToValueAtTime(0.0001, now + duration);
          osc.connect(amp).connect(this.ctx.destination);
          osc.start(now);
          osc.stop(now + duration + 0.03);
        } catch (error) {
          console.error("音频播放失败：", error);
          els.audioTip.textContent = "音频播放失败，请先点击“启用课堂音效”。";
        }
      },
      play(name) {
        if (!this.canPlay("sound") || !this.ensureUnlocked()) return;
        const patterns = {
          click: () => this.tone(520, .07, "triangle", .16),
          start: () => { this.tone(420, .08, "sine", .22); setTimeout(() => this.tone(640, .10, "sine", .24), 80); },
          suspense: () => this.tone(620, .08, "triangle", .20),
          cardFlip: () => { this.tone(320, .05, "square", .18); setTimeout(() => this.tone(760, .06, "triangle", .20), 55); },
          reveal: () => { this.tone(520, .10, "sine", .30); setTimeout(() => this.tone(840, .18, "sine", .34), 110); },
          success: () => { [520, 660, 880].forEach((f, i) => setTimeout(() => this.tone(f, .11, "triangle", .26), i * 85)); },
          applause: () => { [700, 820, 760, 920, 860, 980, 880].forEach((f, i) => setTimeout(() => this.tone(f, .06, "square", .34), i * 52)); },
          countdown: () => this.tone(880, .12, "sine", .36),
          explosionSoft: () => { this.tone(140, .14, "triangle", .28); setTimeout(() => this.tone(360, .14, "sine", .22), 80); },
          scoreAdd: () => { this.tone(660, .08, "triangle", .22); setTimeout(() => this.tone(880, .08, "triangle", .24), 70); },
          scoreMinus: () => this.tone(260, .12, "sine", .20)
        };
        (patterns[name] || patterns.click)();
      },
      async playFile(path = AUDIO_TEST_PATH) {
        const audio = new Audio(path);
        audio.preload = "auto";
        audio.volume = Math.max(0.8, Math.min(1, Number(state.audio.volume || 1)));
        audio.currentTime = 0;
        await audio.play();
        return audio;
      },
      async runAudioTest() {
        state.audio.muted = false;
        state.audio.soundEnabled = true;
        state.audio.musicEnabled = true;
        state.audio.volume = 1;
        this.applySettings();
        saveState();
        const absolutePath = new URL(AUDIO_TEST_PATH, window.location.href).href;
        let statusText = "未请求";
        try {
          const response = await fetch(AUDIO_TEST_PATH, { cache: "reload" });
          statusText = `${response.status} ${response.ok ? "OK" : "失败"}`;
        } catch (error) {
          statusText = `请求失败：${error.message}`;
        }
        const unlocked = await this.unlock();
        let playResult = "未播放";
        try {
          if (!unlocked) throw new Error("AudioContext未启用");
          await this.playFile(AUDIO_TEST_PATH);
          this.play("success");
          playResult = "播放成功";
        } catch (error) {
          console.error("音频播放失败：", error);
          playResult = `播放失败：${error.message}`;
        }
        els.audioTip.textContent = `音频路径：${absolutePath}｜加载状态：${statusText}｜AudioContext状态：${this.ctx ? this.ctx.state : "不可用"}｜播放结果：${playResult}`;
      },
      resetDefaults() {
        state.audio.soundEnabled = true;
        state.audio.musicEnabled = true;
        state.audio.muted = false;
        state.audio.volume = 1;
        state.audio.classroomBoost = true;
        this.applySettings();
        saveState();
        els.audioTip.textContent = "已恢复默认音效设置，请点击“测试音效”。";
      },
      startLoop(name) {
        if (!this.canPlay("music") || !this.ensureUnlocked()) return;
        this.stopLoop();
        this.currentLoop = name;
        const tick = () => {
          if (!this.currentLoop || !this.canPlay("music")) return;
          if (name === "drum") {
            this.tone(170, .07, "triangle", .32);
            setTimeout(() => this.tone(230, .06, "triangle", .24), 120);
          } else if (name === "roulette") {
            this.tone(560, .04, "triangle", .22);
          } else if (name === "ticking") {
            this.tone(760, .04, "sine", .20);
          } else if (name === "background") {
            this.tone(392, .16, "sine", .08);
            setTimeout(() => this.tone(523, .14, "sine", .07), 260);
          } else {
            this.tone(520 + Math.random() * 180, .06, "triangle", .22);
          }
          const delay = name === "drum" ? 360 : name === "roulette" ? 92 : name === "ticking" ? 650 : name === "background" ? 1800 : 140;
          this.loopTimer = setTimeout(tick, delay);
        };
        tick();
      },
      stopLoop() {
        this.currentLoop = null;
        if (this.loopTimer) clearTimeout(this.loopTimer);
        this.loopTimer = null;
      },
      applySettings() {
        document.body.classList.toggle("reduce-motion", state.audio.reduceMotion);
        els.soundToggle.textContent = state.audio.soundEnabled ? "音效 开" : "音效 关";
        els.musicToggle.textContent = state.audio.musicEnabled ? "音乐 开" : "音乐 关";
        els.muteToggle.textContent = state.audio.muted ? "静音 开" : "静音 关";
        els.motionToggle.textContent = state.audio.reduceMotion ? "动画 减少" : "动画 标准";
        els.boostToggle.textContent = state.audio.classroomBoost ? "课堂扩音 开" : "课堂扩音 关";
        els.soundToggle.classList.toggle("active", state.audio.soundEnabled && !state.audio.muted);
        els.musicToggle.classList.toggle("active", state.audio.musicEnabled && !state.audio.muted);
        els.muteToggle.classList.toggle("active", state.audio.muted);
        els.motionToggle.classList.toggle("active", !state.audio.reduceMotion);
        els.boostToggle.classList.toggle("active", state.audio.classroomBoost);
        els.volumeSlider.value = Math.round(state.audio.volume * 100);
        els.volumeValue.textContent = `${Math.round(state.audio.volume * 100)}%`;
        if (state.audio.muted || !state.audio.musicEnabled) this.stopLoop();
      }
    };

    function uid() {
      return "s_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
    }

    function normalizeStudent(student, scoreFallback = 0) {
      const isActive = typeof student.active === "boolean" ? student.active : !student.hidden;
      return {
        id: student.id || uid(),
        name: student.name || "未命名",
        active: isActive,
        hidden: !isActive,
        score: Number(student.score ?? scoreFallback ?? 0),
        lessonScore: Number(student.lessonScore ?? 0),
        scoreCount: Number(student.scoreCount ?? 0),
        lessonScoreCount: Number(student.lessonScoreCount ?? 0),
        calledCount: Number(student.calledCount ?? 0),
        answeredCount: Number(student.answeredCount ?? 0),
        lastScoreTime: Number(student.lastScoreTime ?? 0),
        awardHistory: Array.isArray(student.awardHistory) ? student.awardHistory : []
      };
    }

    function normalizeAllStudents() {
      state.students = state.students.map((student) => normalizeStudent(student, state.classScores[student.id] || 0));
    }

    function studentScore(student, mode = state.mvpScoreMode) {
      return mode === "total" ? Number(student.score || 0) : Number(student.lessonScore || 0);
    }

    function participationStudents() {
      return state.students.filter((student) => student.active !== false && !student.hidden);
    }

    function saveState() {
      const data = {
        students: state.students,
        allowRepeat: state.allowRepeat,
        drawHistory: state.drawHistory,
        groups: state.groups,
        classScores: state.classScores,
        numberHistory: state.numberHistory,
        scoreUndo: state.scoreUndo,
        scoreLogs: state.scoreLogs,
        recentScoreStudentIds: state.recentScoreStudentIds,
        awardedStudentIds: state.awardedStudentIds,
        scorePanelOpen: state.scorePanelOpen,
        scoreMode: state.scoreMode,
        mvpScoreMode: state.mvpScoreMode,
        showQuickScore: state.showQuickScore,
        audio: state.audio
      };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        els.savedBadge.textContent = "已本地保存";
      } catch (error) {
        els.savedBadge.textContent = "本地保存不可用";
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        state.students = Array.isArray(data.students) ? data.students : [];
        state.allowRepeat = Boolean(data.allowRepeat);
        state.drawHistory = Array.isArray(data.drawHistory) ? data.drawHistory : [];
        state.groups = Array.isArray(data.groups) ? data.groups : [];
        state.classScores = data.classScores && typeof data.classScores === "object" ? data.classScores : {};
        state.numberHistory = Array.isArray(data.numberHistory) ? data.numberHistory : [];
        state.scoreUndo = Array.isArray(data.scoreUndo) ? data.scoreUndo : [];
        state.scoreLogs = Array.isArray(data.scoreLogs) ? data.scoreLogs : [];
        state.recentScoreStudentIds = Array.isArray(data.recentScoreStudentIds) ? data.recentScoreStudentIds : [];
        state.awardedStudentIds = Array.isArray(data.awardedStudentIds) ? data.awardedStudentIds : [];
        state.scorePanelOpen = Boolean(data.scorePanelOpen);
        state.scoreMode = data.scoreMode === "total" ? "total" : "lesson";
        state.mvpScoreMode = data.mvpScoreMode === "total" ? "total" : "lesson";
        state.showQuickScore = data.showQuickScore !== false;
        if (data.audio && typeof data.audio === "object") {
          state.audio = { ...state.audio, ...data.audio };
          state.audio.muted = false;
          state.audio.soundEnabled = true;
          state.audio.musicEnabled = true;
          state.audio.volume = Math.max(0.8, Number(state.audio.volume) || 0.8);
        }
        normalizeAllStudents();
        els.rosterInput.value = state.students.map((student, index) => `${index + 1}. ${student.name}`).join("\n");
        els.allowRepeat.checked = state.allowRepeat;
      } catch (error) {
        console.warn("无法读取本地名单", error);
      }
    }

    function cleanName(token) {
      return token
        .replace(/^[\s\u3000]*第?[0-9０-９一二三四五六七八九十百]+[.、,，)）:：号名\s\u3000-]*/u, "")
        .replace(/^[\s\u3000]*[.、,，)）:：-]+/u, "")
        .replace(/[;；，,、。.!！?？:：]+$/u, "")
        .replace(/[“”"'《》<>【】\[\]{}]/g, "")
        .trim();
    }

    function parseRoster(text) {
      const normalized = text
        .replace(/\r/g, "\n")
        .replace(/[|\/\\]+/g, "\n")
        .replace(/[、,，;；\t]+/g, "\n")
        .replace(/\s{2,}/g, "\n");
      const names = [];
      const seen = new Set();
      const duplicates = new Set();

      normalized.split(/\n+/).forEach((line) => {
        const pieces = line.split(/\s+/).filter(Boolean);
        (pieces.length ? pieces : [line]).forEach((piece) => {
          const name = cleanName(piece);
          if (!name) return;
          if (/^[0-9０-９一二三四五六七八九十百]+$/u.test(name)) return;
          if (seen.has(name)) {
            duplicates.add(name);
          } else {
            seen.add(name);
            names.push(name);
          }
        });
      });

      return { names, duplicates: Array.from(duplicates) };
    }

    function activeStudents() {
      return state.students.filter((student) => student.active !== false && !student.hidden);
    }

    function availableStudents() {
      const active = activeStudents();
      if (state.allowRepeat) return active;
      const drawnIds = new Set(state.drawHistory.map((item) => item.id));
      return active.filter((student) => !drawnIds.has(student.id));
    }

    function randomItem(items) {
      if (!items.length) return null;
      return items[Math.floor(Math.random() * items.length)];
    }

    function recordDraw(student, toolLabel) {
      student.calledCount = Number(student.calledCount || 0) + 1;
      state.drawHistory.push({ id: student.id, name: student.name, tool: toolLabel, time: Date.now() });
      saveState();
      renderAll();
    }

    function shuffle(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function drawStudent(toolLabel, options = {}) {
      let pool;
      if (options.fromAnswered) {
        pool = state.drawHistory.map((item) => state.students.find((student) => student.id === item.id)).filter(Boolean);
      } else if (options.forceNoRepeat) {
        const drawnIds = new Set(state.drawHistory.map((item) => item.id));
        pool = activeStudents().filter((student) => !drawnIds.has(student.id));
      } else {
        pool = options.forceRepeat ? activeStudents() : availableStudents();
      }
      const student = randomItem(pool);
      if (!student) return null;
      recordDraw(student, toolLabel);
      return student;
    }

    function renderAll() {
      const active = activeStudents();
      els.statTotal.textContent = state.students.length;
      els.statActive.textContent = active.length;
      els.statDrawn.textContent = state.drawHistory.length;
      els.allowRepeat.checked = state.allowRepeat;
      renderScorePanel();

      if (!state.students.length) {
        els.studentList.innerHTML = '<div class="empty">还没有导入名单</div>';
        return;
      }

      const paused = state.students.length - active.length;
      els.studentList.innerHTML = `
        <div class="roster-summary">
          <div class="roster-summary-card"><b>${state.students.length}</b><span>当前班级</span></div>
          <div class="roster-summary-card"><b>${active.length}</b><span>参与课堂</span></div>
          <div class="roster-summary-card"><b>${paused}</b><span>请假/暂停</span></div>
        </div>
        <div class="list-tools">
          <button class="light-btn" data-open-roster-manager>管理名单</button>
          <button class="light-btn" data-reimport-roster>重新导入</button>
          <button class="light-btn" data-clear-roster-inline>清空名单</button>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function showAudioTip() {
      if (!audioManager.unlocked && (state.audio.soundEnabled || state.audio.musicEnabled) && !state.audio.muted) {
        els.audioOverlay.classList.add("show");
      }
    }

    function clearAnimation() {
      if (state.animationId) {
        cancelAnimationFrame(state.animationId);
        state.animationId = null;
      }
    }

    function flashResult() {
      if (state.audio.reduceMotion) return;
      const box = document.getElementById("resultBox");
      if (!box) return;
      box.classList.remove("flash", "spotlight");
      void box.offsetWidth;
      box.classList.add("flash", "spotlight");
    }

    function burstParticles(container = document.getElementById("resultBox"), count = 36) {
      if (!container || state.audio.reduceMotion) return;
      const colors = ["#2563eb", "#16a34a", "#f97316", "#facc15", "#0891b2", "#7c3aed", "#ef4444"];
      for (let i = 0; i < count; i += 1) {
        const particle = document.createElement("span");
        particle.className = "particle";
        const angle = (Math.PI * 2 * i) / count;
        const distance = 80 + Math.random() * 160;
        particle.style.setProperty("--tx", `${Math.cos(angle) * distance}px`);
        particle.style.setProperty("--ty", `${Math.sin(angle) * distance}px`);
        particle.style.setProperty("--pcolor", colors[i % colors.length]);
        particle.style.transform = `rotate(${Math.random() * 180}deg)`;
        container.appendChild(particle);
        setTimeout(() => particle.remove(), 1000);
      }
    }

    function celebrate(sound = "success") {
      flashResult();
      burstParticles();
      audioManager.play("reveal");
      setTimeout(() => audioManager.play(sound), 180);
    }

    async function rollNamesToResult(finalStudent, label, toolLabel, options = {}) {
      const pool = options.forceNoRepeat ? activeStudents().filter((student) => !new Set(state.drawHistory.map((item) => item.id)).has(student.id)) : activeStudents();
      const names = pool.length ? pool : activeStudents();
      const bigName = document.getElementById("bigName");
      const sub = document.getElementById("subline");
      if (!bigName || !sub || !finalStudent) return;
      bigName.classList.add("rolling-name");
      sub.textContent = "快速滚动中";
      audioManager.play("start");
      audioManager.startLoop("suspense");
      const steps = state.audio.reduceMotion ? 8 : 32;
      for (let i = 0; i < steps; i += 1) {
        const picked = randomItem(names);
        bigName.textContent = picked ? picked.name : "...";
        await sleep(28 + i * 7);
      }
      audioManager.stopLoop();
      bigName.classList.remove("rolling-name");
      recordDraw(finalStudent, toolLabel);
      setBigResult(finalStudent.name, label);
      updateQuickScoreBox(finalStudent);
      refreshHistoryBox();
      celebrate("applause");
    }

    function drawStudentCandidate(options = {}) {
      let pool;
      if (options.fromAnswered) {
        pool = state.drawHistory.map((item) => state.students.find((student) => student.id === item.id)).filter(Boolean);
      } else if (options.forceNoRepeat) {
        const drawnIds = new Set(state.drawHistory.map((item) => item.id));
        pool = activeStudents().filter((student) => !drawnIds.has(student.id));
      } else {
        pool = options.forceRepeat ? activeStudents() : availableStudents();
      }
      return randomItem(pool);
    }

      openModal("需要先导入名单", `<div class="message">请先在首页粘贴并导入学生名单，再使用课堂工具。</div>`);

    function findStudent(id) {
      return state.students.find((student) => student.id === id);
    }

    function addScore(studentId, value, reason = "课堂积分") {
      const student = findStudent(studentId);
      if (!student || !Number.isFinite(Number(value)) || Number(value) === 0) return;
      value = Number(value);
      state.scoreUndo.push({
        studentId,
        beforeScore: Number(student.score || 0),
        beforeLessonScore: Number(student.lessonScore || 0),
        beforeScoreCount: Number(student.scoreCount || 0),
        beforeLessonScoreCount: Number(student.lessonScoreCount || 0),
        time: Date.now()
      });
      if (state.scoreMode === "total") {
        student.score = Number(student.score || 0) + value;
      }
      student.lessonScore = Number(student.lessonScore || 0) + value;
      if (value > 0) {
        student.scoreCount = Number(student.scoreCount || 0) + 1;
        student.lessonScoreCount = Number(student.lessonScoreCount || 0) + 1;
        student.lastScoreTime = Date.now();
      }
      state.scoreLogs.unshift({ studentId, name: student.name, value, reason, time: Date.now() });
      state.scoreLogs = state.scoreLogs.slice(0, 120);
      state.recentScoreStudentIds = [studentId, ...state.recentScoreStudentIds.filter((id) => id !== studentId)].slice(0, 8);
      audioManager.play(value >= 0 ? "scoreAdd" : "scoreMinus");
      saveState();
      renderScorePanel(studentId);
    }

    function undoScore() {
      const prev = state.scoreUndo.pop();
      if (!prev) return;
      const student = findStudent(prev.studentId);
      if (!student) return;
      student.score = prev.beforeScore;
      student.lessonScore = prev.beforeLessonScore;
      student.scoreCount = prev.beforeScoreCount;
      student.lessonScoreCount = prev.beforeLessonScoreCount;
      state.scoreLogs.unshift({ studentId: student.id, name: student.name, value: 0, reason: "撤销上一步", time: Date.now() });
      audioManager.play("click");
      saveState();
      renderScorePanel(student.id);
    }

    function scoreCandidates(query = "") {
      const q = query.trim();
      let students = q
        ? state.students.filter((student) => student.name.includes(q))
        : state.recentScoreStudentIds.map(findStudent).filter(Boolean);
      if (!students.length) students = activeStudents().slice(0, 6);
      return students.slice(0, 8);
    }

    function renderScorePanel(highlightId = "") {
      if (!els.scoreDock) return;
      els.scoreDock.classList.toggle("collapsed", !state.scorePanelOpen);
      document.querySelectorAll('input[name="scoreMode"]').forEach((input) => { input.checked = input.value === state.scoreMode; });
      document.querySelectorAll('input[name="mvpScoreMode"]').forEach((input) => { input.checked = input.value === state.mvpScoreMode; });
      const rows = scoreCandidates(els.scoreSearch ? els.scoreSearch.value : "").map((student) => `
        <div class="score-row ${student.id === highlightId ? "highlight" : ""}" data-score-student="${student.id}">
          <div class="score-name">
            <strong>${escapeHtml(student.name)}：${student.lessonScore || 0} 分</strong>
            <span>累计 ${student.score || 0} 分 · 得分 ${student.lessonScoreCount || 0} 次${student.active === false || student.hidden ? " · 暂停参与" : ""}</span>
          </div>
          <div class="score-actions">
            <button class="mini-btn" data-quick-score="-1">-1</button>
            <button class="mini-btn" data-quick-score="1">+1</button>
            <button class="mini-btn" data-quick-score="2">+2</button>
            <button class="mini-btn" data-quick-score="5">+5</button>
            <button class="mini-btn" data-clear-student-score>清零</button>
          </div>
        </div>
      `).join("");
      els.scoreQuickList.innerHTML = rows || '<div class="empty">导入名单后可直接加分</div>';
    }

    function renderQuickScore(student) {
      if (!state.showQuickScore || !student) return "";
      return `
        <div class="quick-score-box" id="quickScoreBox" data-student-id="${student.id}">
          <h3>${escapeHtml(student.name)} 快捷加分</h3>
          <div class="stage-controls" style="margin-top:0;justify-content:flex-start;">
            <button class="btn success" data-result-score="2">回答优秀 +2</button>
            <button class="btn cyan" data-result-score="1">积极参与 +1</button>
            <button class="btn warning" data-result-score="1">需要鼓励 +1</button>
            <button class="light-btn" data-result-score="custom">自定义加分</button>
          </div>

      `;
    }

    function updateQuickScoreBox(student) {
      const old = document.getElementById("quickScoreBox");
      if (old) old.remove();
      const resultBox = document.getElementById("resultBox");
      if (resultBox && resultBox.parentElement && student) {
        resultBox.insertAdjacentHTML("afterend", renderQuickScore(student));
      }

    function openRosterManager() {
      openModal("管理名单", `
        <div class="config-box">
          <div class="form-grid">
            <input class="roster-search" id="rosterSearch" type="search" placeholder="搜索学生姓名">
            <button class="btn success" id="restoreAllRoster">恢复全员参与</button>
          </div>
        </div>
        <div class="roster-manager-list" id="rosterManagerList"></div>
      `);
      const render = () => {
        const q = document.getElementById("rosterSearch").value.trim();
        const rows = state.students
          .filter((student) => !q || student.name.includes(q))
          .map((student) => `
            <div class="roster-row ${student.active === false || student.hidden ? "paused" : ""}" data-roster-id="${student.id}">
              <div>
                <strong>${escapeHtml(student.name)}</strong>
                <div class="subline" style="font-size:14px;margin-top:4px;">本节课 ${student.lessonScore || 0} 分 · 累计 ${student.score || 0} 分 · 点名 ${student.calledCount || 0} 次</div>
              </div>
              <div class="row-actions">
                <button class="mini-btn" data-roster-toggle>${student.active === false || student.hidden ? "恢复参与" : "暂停参与"}</button>
                <button class="mini-btn" data-roster-rename>修改姓名</button>
                <button class="mini-btn" data-roster-delete>删除</button>
              </div>
            </div>
          `).join("");
        document.getElementById("rosterManagerList").innerHTML = rows || '<div class="empty">没有匹配学生</div>';
      };
      document.getElementById("rosterSearch").addEventListener("input", render);
      document.getElementById("restoreAllRoster").addEventListener("click", () => {
        state.students.forEach((student) => { student.active = true; student.hidden = false; });
        saveState();
        renderAll();
        render();
      });
      document.getElementById("rosterManagerList").addEventListener("click", (event) => {
        const row = event.target.closest("[data-roster-id]");
        if (!row) return;
        const student = findStudent(row.dataset.rosterId);
        if (!student) return;
        if (event.target.closest("[data-roster-toggle]")) {
          const nextActive = student.active === false || student.hidden;
          student.active = nextActive;
          student.hidden = !nextActive;
        }
        if (event.target.closest("[data-roster-rename]")) {
          const next = prompt("请输入新的学生姓名", student.name);
          if (next && next.trim()) student.name = next.trim();
        }
        if (event.target.closest("[data-roster-delete]")) {
          if (confirm(`确定删除 ${student.name} 吗？积分记录也会从名单中移除。`)) {
            state.students = state.students.filter((item) => item.id !== student.id);
          }
        }
        saveState();
        renderAll();
        render();
      });
      render();
    }

    function rankStudents() {
      const active = activeStudents();
      return active.slice().sort((a, b) => studentScore(b, state.mvpScoreMode) - studentScore(a, state.mvpScoreMode));
    }

    function openScoreRank(limit = "all", hideScore = false) {
      let currentLimit = limit;
      let currentHideScore = hideScore;
      const renderRank = (rankLimit = limit, hidden = hideScore) => {
        const sorted = rankStudents();
        const limited = rankLimit === "all" ? sorted : sorted.slice(0, Number(rankLimit));
        let previousScore = null;
        let currentRank = 0;
        return `
          <div class="rank-options">
            <button data-rank-limit="all">全部</button>
            <button data-rank-limit="5">前5名</button>
            <button data-rank-limit="10">前10名</button>
            <button data-hide-score="${hidden ? "0" : "1"}">${hidden ? "显示分数" : "隐藏分数"}</button>
          </div>
          <div class="leaderboard" id="scoreRankBoard">
            ${limited.map((student, index) => {
              const score = studentScore(student, state.mvpScoreMode);
              if (score !== previousScore) currentRank = index + 1;
              previousScore = score;
              const medal = currentRank === 1 ? "★" : currentRank === 2 ? "☆" : currentRank === 3 ? "◇" : currentRank;
              return `
                <div class="rank-row">
                  <span class="rank">${medal}</span>
                  <span>${escapeHtml(student.name)}</span>
                  <span>${hidden ? "" : `${score} 分`}</span>
                </div>
              `;
            }).join("") || '<div class="message">暂无可参与学生</div>'}
          </div>
        `;
      };
      openModal("积分排行榜", renderRank(currentLimit, currentHideScore));
      els.stageBody.addEventListener("click", (event) => {
        const limitButton = event.target.closest("[data-rank-limit]");
        const hideButton = event.target.closest("[data-hide-score]");
        if (limitButton) {
          currentLimit = limitButton.dataset.rankLimit;
          els.stageBody.innerHTML = renderRank(currentLimit, currentHideScore);
        }
        if (hideButton) {
          currentHideScore = hideButton.dataset.hideScore === "1";
          els.stageBody.innerHTML = renderRank(currentLimit, currentHideScore);
        }
      }, { once: false });
    }

    async function rollNumber(finalNumber, subline, recordKey = "lucky", recordValue = finalNumber) {
      const bigName = document.getElementById("bigName");
      const sub = document.getElementById("subline");
      if (!bigName || !sub) return;
      const min = Number(bigName.dataset.min || 1);
      const max = Number(bigName.dataset.max || Math.max(30, finalNumber));
      bigName.classList.add("rolling-name");
      sub.textContent = "数字滚动中";
      audioManager.startLoop("roulette");
      const steps = state.audio.reduceMotion ? 8 : 30;
      for (let i = 0; i < steps; i += 1) {
        bigName.textContent = Math.floor(Math.random() * (max - min + 1)) + min;
        audioManager.play("suspense");
        await sleep(24 + i * 6);
      }
      audioManager.stopLoop();
      bigName.classList.remove("rolling-name");
      bigName.textContent = finalNumber;
      sub.textContent = subline;
      state.numberHistory.push({ key: recordKey, value: recordValue, time: Date.now() });
      saveState();
      renderNumberRecords(recordKey);
      celebrate("success");
    }

    function renderNumberRecords(recordKey) {
      const box = document.getElementById("numberRecords");
      if (!box) return;
      const records = state.numberHistory.filter((item) => item.key === recordKey).slice(-30).reverse();
      box.innerHTML = records.length ? records.map((item) => `<span>${item.value}</span>`).join("") : "<span>暂无记录</span>";
    }

    function renderLuckyNumber() {
      if (!ensureRoster()) return;
      openModal("幸运号码", `
        ${resultTemplate("准备抽号", "按当前名单序号抽取")}
        <div class="stage-controls">
          <button class="btn cyan" id="drawNumber">抽取号码</button>
          <button class="light-btn" id="clearNumberHistory">清空号码记录</button>
        </div>
        <div class="history-box"><h3>已抽号码</h3><div class="number-records" id="numberRecords"></div></div>
        ${renderHistoryBox()}
      `);
      renderNumberRecords("luckyNumber");
      document.getElementById("drawNumber").addEventListener("click", () => {
        const student = drawStudentCandidate({});
        if (!student) {
          setBigResult("已全部抽完", "可开启重复抽取，或重置本节课记录");
          return;
        }
        const index = state.students.findIndex((item) => item.id === student.id) + 1;
        document.getElementById("bigName").dataset.min = 1;
        document.getElementById("bigName").dataset.max = state.students.length;
        recordDraw(student, "幸运号码");
        rollNumber(index, student.name, "luckyNumber");
        setTimeout(() => updateQuickScoreBox(student), state.audio.reduceMotion ? 500 : 1200);

    function renderWheel() {
      if (!ensureRoster()) return;
      let wheelAllowRepeat = state.allowRepeat;
      const buildWheel = () => {
        const pool = wheelAllowRepeat ? activeStudents() : availableStudents();
        if (!pool.length) {
          return `<div class="message">当前没有可抽取学生。可开启允许重复，或重置本节课记录。</div>`;
        }
        const colors = ["#2563eb", "#f97316", "#16a34a", "#facc15", "#0891b2", "#7c3aed", "#ef4444", "#0ea5e9"];
        const step = 100 / pool.length;
        const gradient = pool.map((student, index) => `${colors[index % colors.length]} ${index * step}% ${(index + 1) * step}%`).join(", ");
        const labels = pool.map((student, index) => {
          const angle = (index + .5) * (360 / pool.length);
          return `<span class="wheel-name" style="transform: rotate(${angle}deg) translate(-8px, -50%);">${escapeHtml(student.name)}</span>`;
        }).join("");
        return `
          <div class="wheel" id="wheelDisk" style="background: conic-gradient(${gradient});" data-pool="${pool.map((student) => student.id).join(",")}">
            <div class="wheel-labels">${labels}</div>
            <div class="wheel-center" id="wheelCenter">开始</div>
          </div>
        `;
      };
      openModal("幸运转盘", `
        <div class="wheel-wrap">
          <div id="wheelMount">${buildWheel()}</div>
          <div>
            ${resultTemplate("幸运转盘", "点击开始，转盘会抽出一位同学")}
            <div class="switch-row">
              <label class="switch-line"><span>本转盘允许重复</span><input type="checkbox" id="wheelRepeat" ${wheelAllowRepeat ? "checked" : ""}></label>
            </div>
            <div class="stage-controls">
              <button class="btn warning" id="spinWheel">开始转盘</button>
              <button class="light-btn" id="resetWheelRecord">重置记录</button>
            </div>
            ${renderHistoryBox()}
          </div>
        </div>
      `);
      document.getElementById("wheelRepeat").addEventListener("change", (event) => {
        wheelAllowRepeat = event.target.checked;
        document.getElementById("wheelMount").innerHTML = buildWheel();
      });
      document.getElementById("resetWheelRecord").addEventListener("click", () => {
        state.drawHistory = [];
        saveState();
        renderAll();
        refreshHistoryBox();
        document.getElementById("wheelMount").innerHTML = buildWheel();
        setBigResult("记录已重置", "可以重新开始转盘");
      });
      document.getElementById("spinWheel").addEventListener("click", (event) => {
        const spinButton = event.currentTarget;
        const pool = wheelAllowRepeat ? activeStudents() : availableStudents();
        const student = randomItem(pool);
        if (!student) {
          setBigResult("已全部抽完", "可开启重复抽取，或重置本节课记录");
          audioManager.play("scoreMinus");
          return;
        }
        const wheelDisk = document.getElementById("wheelDisk");
        const poolIds = wheelDisk.dataset.pool.split(",");
        const index = poolIds.indexOf(student.id);
        const segment = 360 / poolIds.length;
        const centerAngle = index * segment + segment / 2;
        const targetRotation = (Math.ceil(state.wheelRotation / 360) + 7) * 360 - centerAngle;
        spinButton.disabled = true;
        state.wheelRotation = targetRotation;
        wheelDisk.classList.add("spinning");
        wheelDisk.style.transform = `rotate(${state.wheelRotation}deg)`;
        document.getElementById("wheelCenter").textContent = "转";
        setBigResult("转动中", "请同学们一起倒数");
        audioManager.play("start");
        audioManager.startLoop("roulette");
        let ticks = 0;
        const clicker = setInterval(() => {
          ticks += 1;
          if (ticks % 2 === 0) audioManager.play("click");
        }, 180);
        setTimeout(() => {
          clearInterval(clicker);
          audioManager.stopLoop();
          recordDraw(student, "幸运转盘");
          document.getElementById("wheelCenter").textContent = student.name;
          setBigResult(student.name, "幸运转盘抽中");
          updateQuickScoreBox(student);
          refreshHistoryBox();
          celebrate("applause");
          wheelDisk.classList.remove("spinning");
          if (!wheelAllowRepeat) document.getElementById("wheelMount").innerHTML = buildWheel();
          spinButton.disabled = false;
        }, state.audio.reduceMotion ? 900 : 4300);
      });
    }
