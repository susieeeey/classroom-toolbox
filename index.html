      document.getElementById("drawQuestion").addEventListener("click", async () => {
        let min = Number(document.getElementById("minQuestion").value) || 1;
        let max = Number(document.getElementById("maxQuestion").value) || 20;
        if (min > max) [min, max] = [max, min];
        const used = new Set(state.numberHistory.filter((item) => item.key === "questionNumber").map((item) => item.value));
        const candidates = [];
        for (let value = min; value <= max; value += 1) {
          if (!document.getElementById("questionNoRepeat").checked || !used.has(value)) candidates.push(value);
        }
        if (!candidates.length) {
          setBigResult("已抽完", "请清空记录或关闭不重复");
          audioManager.play("scoreMinus");
          return;
        }
        const number = randomItem(candidates);
        document.getElementById("bigName").dataset.min = min;
        document.getElementById("bigName").dataset.max = max;
        await rollNumber(`${number} 题`, `范围：${min} - ${max}`, "questionNumber", number);
      });
      document.getElementById("clearQuestionHistory").addEventListener("click", () => {
        state.numberHistory = state.numberHistory.filter((item) => item.key !== "questionNumber");
        saveState();
        renderNumberRecords("questionNumber");
      });

            state.timerId = null;

        const button = event.target.closest("[data-time]");
        if (!button) return;
        document.getElementById("timerSeconds").value = button.dataset.time;
        left = Number(button.dataset.time);
        total = left;
        updateTimer();
      });
      document.getElementById("startTimer").addEventListener("click", () => {
        stopAllTimers();
        left = Math.max(3, Number(document.getElementById("timerSeconds").value) || 30);
        total = left;
        updateTimer();
        display.classList.remove("danger-time");
        audioManager.play("start");
        runTimer();
      });
      document.getElementById("pauseTimer").addEventListener("click", () => {
        if (state.timerId) clearInterval(state.timerId);
        state.timerId = null;
        subline.textContent = "已暂停";
      });
      document.getElementById("resumeTimer").addEventListener("click", () => {
        runTimer();
      });
      document.getElementById("resetTimer").addEventListener("click", () => {
        stopAllTimers();
        left = Math.max(3, Number(document.getElementById("timerSeconds").value) || 30);
        total = left;
        subline.textContent = "准备抢答";
        updateTimer();
      });
    }

    function buildGroups(groupCount, options = {}) {
      const active = shuffle(activeStudents());
      if (options.sizeMode && options.groupSize) {
        groupCount = Math.max(1, Math.ceil(active.length / options.groupSize));
      }
      const groups = Array.from({ length: Math.min(groupCount, Math.max(1, active.length)) }, (_, index) => ({
        id: "g_" + (index + 1),
        name: `第 ${index + 1} 组`,
        memberIds: [],
        score: state.groups[index] ? Number(state.groups[index].score) || 0 : 0,
        leaderId: ""
      }));
      active.forEach((student, index) => groups[index % groups.length].memberIds.push(student.id));
      if (options.autoLeader) {
        groups.forEach((group) => {
          group.leaderId = randomItem(group.memberIds) || "";
        });
        audioManager.play("success");
      }
      state.groups = groups;
      saveState();
      return groups;
    }

    function memberName(id) {

      document.getElementById("makeGroups").addEventListener("click", make);
      document.getElementById("remakeGroups").addEventListener("click", make);

    }

    function ensureGroups() {
      if (!state.groups.length && activeStudents().length) buildGroups(Math.min(4, activeStudents().length));
      return state.groups.length > 0;
    }

      ensureGroups();
      openModal("小组PK积分", `

          <button class="btn success" id="regroup">重新随机分组</button>
          <button class="btn warning" id="awardGroup">大屏颁奖</button>

          <button class="btn danger" id="clearGroupScore">小组清零</button>
        </div>
        <div class="config-box">
          <div class="form-grid">
            <div class="field"><label>自定义分数</label><input id="customGroupScore" type="number" value="3"></div>

        const box = document.getElementById("pkRank");

          <div class="rank-row">
            <span class="rank">${index === 0 ? "★" : index + 1}</span>
            <span>${escapeHtml(group.name)}</span>
            <span>${group.score} 分</span>
          </div>
        `).join("");
      };
      updateRank();
      document.getElementById("groupGrid").addEventListener("click", (event) => {
        const button = event.target.closest("[data-score]");
        if (!button) return;
        const groupNode = event.target.closest("[data-group-id]");
        const group = state.groups.find((item) => item.id === groupNode.dataset.groupId);
        const value = button.dataset.score === "custom" ? Number(document.getElementById("customGroupScore").value) || 0 : Number(button.dataset.score);
        state.groupScoreUndo.push(JSON.stringify(state.groups));
        group.score += value;
        saveState();
        audioManager.play(value >= 0 ? "scoreAdd" : "scoreMinus");
        const card = document.querySelector(`[data-group-id="${group.id}"]`);
        if (card) {
          card.classList.add("glow");
          const score = card.querySelector(".score");
          if (score) score.classList.add("bump");
          const pop = document.createElement("span");
          pop.className = "score-pop";
          pop.textContent = value > 0 ? `+${value}` : value;
          card.appendChild(pop);
          setTimeout(() => renderGroupPK(), 620);
        } else {
          renderGroupPK();
        }
      });
      document.getElementById("groupGrid").addEventListener("dblclick", (event) => {
        const groupNode = event.target.closest("[data-group-id]");
        if (!groupNode) return;
        const group = state.groups.find((item) => item.id === groupNode.dataset.groupId);
        const value = Number(document.getElementById("customGroupScore").value) || 0;
        state.groupScoreUndo.push(JSON.stringify(state.groups));
        group.score += value;
        saveState();
        audioManager.play(value >= 0 ? "scoreAdd" : "scoreMinus");
        renderGroupPK();
      });
      document.getElementById("showGroupRankInPk").addEventListener("change", updateRank);
      document.getElementById("regroup").addEventListener("click", () => {
        buildGroups(state.groups.length || 4, { autoLeader: true });
        renderGroupPK();
      });
      document.getElementById("undoGroupScore").addEventListener("click", () => {
        const prev = state.groupScoreUndo.pop();
        if (!prev) return;
        state.groups = JSON.parse(prev);
        saveState();
        audioManager.play("click");
        renderGroupPK();
      });
      document.getElementById("clearGroupScore").addEventListener("click", () => {
        state.groupScoreUndo.push(JSON.stringify(state.groups));
        state.groups.forEach((group) => { group.score = 0; });
        saveState();
        renderGroupPK();
      });
      document.getElementById("awardGroup").addEventListener("click", () => {

    function renderReward(title, preferAnswered) {
      if (!ensureRoster()) return;
      const isMvp = title === "今日课堂MVP";
      const modeOptions = isMvp
        ? `
          <option value="top">积分最高</option>
          <option value="top3">前三名中随机</option>
          <option value="manual">老师手动选择</option>
          <option value="customRandom">自定义随机</option>
        `
        : title === "幸运之星"
          ? `
            <option value="scored">本节课获得过积分</option>
            <option value="all">全班随机</option>
            <option value="notAwarded">未获奖学生</option>
            <option value="manual">老师手动选择</option>
          `
          : title === "勇敢回答奖"
            ? `
              <option value="calledOrScored">被点名或获得过积分</option>
              <option value="called">本节课被点名</option>
              <option value="scored">本节课获得过积分</option>
              <option value="manual">老师手动选择</option>
            `
            : title === "进步之星"
              ? `
                <option value="recentGrowth">最近获得积分</option>
                <option value="scored">本节课获得过积分</option>
                <option value="manual">老师手动选择</option>
              `
              : `
                <option value="activeCount">获得积分次数最多</option>
                <option value="scored">本节课获得过积分</option>
                <option value="manual">老师手动选择</option>
              `;
      openModal(title, `
        <div class="config-box">
          <div class="form-grid">
            <div class="field"><label>奖项名称</label><input id="awardName" type="text" value="${escapeHtml(title)}"></div>
            <div class="field"><label>获奖人数</label>
              <select id="awardCount">
                <option value="1">1人</option>
                <option value="2">2人</option>
                <option value="3">3人</option>
              </select>
            </div>
            <div class="field"><label>评选模式</label><select id="awardMode">${modeOptions}</select></div>
            <div class="field"><label>手动选择</label>
              <select id="manualAward">
                <option value="">随机抽取</option>
                ${activeStudents().map((student) => `<option value="${student.id}">${escapeHtml(student.name)}</option>`).join("")}
              </select>
            </div>
          </div>
        </div>
        <div class="stage-result spotlight" id="resultBox">
          <div>
            <div class="award-mark">★</div>
            <div class="big-name" id="bigName">准备颁奖</div>
            <div class="subline" id="subline">${preferAnswered ? "优先从已回答同学中抽取" : "从当前参与名单中抽取"}</div>
          </div>
        </div>
        <div class="stage-controls">
          <button class="btn warning" id="drawReward">开始颁奖</button>
          <button class="light-btn" id="switchRewardPool">${preferAnswered ? "改为全班抽取" : "从已回答抽取"}</button>
          <button class="light-btn" id="returnReward">返回</button>
        </div>
        ${renderHistoryBox()}
      `);
      let fromAnswered = preferAnswered;
      const getCandidates = () => {
        const mode = document.getElementById("awardMode").value;
        const active = activeStudents();
        if (mode === "manual") {
          const student = findStudent(document.getElementById("manualAward").value);
          return student ? [student] : [];
        }
        if (isMvp && mode === "top") {
          const max = Math.max(...active.map((student) => studentScore(student, state.mvpScoreMode)), -Infinity);
          return active.filter((student) => studentScore(student, state.mvpScoreMode) === max && max > 0);
        }
        if (isMvp && mode === "top3") {
          return rankStudents().slice(0, 3);
        }
        if (isMvp && mode === "customRandom") return active;
        if (mode === "all") return active;
        if (mode === "notAwarded") return active.filter((student) => !state.awardedStudentIds.includes(student.id));
        if (mode === "called") return active.filter((student) => (student.calledCount || 0) > 0);
        if (mode === "scored") return active.filter((student) => (student.lessonScoreCount || 0) > 0 || (student.lessonScore || 0) > 0);
        if (mode === "calledOrScored") return active.filter((student) => (student.calledCount || 0) > 0 || (student.lessonScoreCount || 0) > 0);
        if (mode === "recentGrowth") {
          return active.filter((student) => (student.lessonScoreCount || 0) > 0).sort((a, b) => (b.lastScoreTime || 0) - (a.lastScoreTime || 0)).slice(0, 6);
        }
        if (mode === "activeCount") {
          const max = Math.max(...active.map((student) => student.lessonScoreCount || 0), 0);
          return active.filter((student) => (student.lessonScoreCount || 0) === max && max > 0);
        }
        return fromAnswered
          ? state.drawHistory.map((item) => findStudent(item.id)).filter(Boolean)
          : active;
      };
      document.getElementById("drawReward").addEventListener("click", async () => {
        const awardName = document.getElementById("awardName").value.trim() || title;
        const manualId = document.getElementById("manualAward").value;
        const count = Math.max(1, Math.min(3, Number(document.getElementById("awardCount").value) || 1));
        let winners = [];
        if (manualId) {
          const student = state.students.find((item) => item.id === manualId);
          if (student) winners = [student];
        } else {
          const basePool = getCandidates();
          winners = shuffle([...new Map(basePool.map((student) => [student.id, student])).values()]).slice(0, count);
        }
        if (!winners.length) {
          setBigResult("暂无候选", isMvp ? "请先给学生加分，或切换评选模式" : "请切换候选范围");
          return;
        }
        const bigName = document.getElementById("bigName");
        audioManager.startLoop("suspense");
        for (let i = 0; i < (state.audio.reduceMotion ? 6 : 24); i += 1) {
          const student = randomItem(activeStudents());
          if (student) bigName.textContent = student.name;
          await sleep(35 + i * 7);
        }
        audioManager.stopLoop();
        winners.forEach((student) => {
          student.awardHistory.push({ award: awardName, time: Date.now() });
          state.awardedStudentIds = [student.id, ...state.awardedStudentIds.filter((id) => id !== student.id)];
        });
        saveState();
        const scoreText = winners.map((student) => `${student.name}${isMvp ? `（${studentScore(student, state.mvpScoreMode)}分）` : ""}`).join("、");
        setBigResult(scoreText, awardName);
        refreshHistoryBox();
        celebrate("applause");
      });
      document.getElementById("switchRewardPool").addEventListener("click", (event) => {
        fromAnswered = !fromAnswered;
        event.currentTarget.textContent = fromAnswered ? "改为全班抽取" : "从已回答抽取";
        setBigResult("抽取范围已切换", fromAnswered ? "从已回答同学中抽取" : "从当前参与名单中抽取");
      });
      document.getElementById("returnReward").addEventListener("click", closeModal);
    }

    function renderFloatingPieces() {
      if (state.audio.reduceMotion || document.querySelector(".floating-piece")) return;
      const colors = ["rgba(37,99,235,.16)", "rgba(22,163,74,.14)", "rgba(249,115,22,.15)", "rgba(250,204,21,.22)", "rgba(124,58,237,.12)"];
      for (let i = 0; i < 18; i += 1) {
        const piece = document.createElement("span");
        piece.className = "floating-piece";
        piece.style.left = `${Math.random() * 96}%`;
        piece.style.top = `${Math.random() * 92}%`;
        piece.style.background = colors[i % colors.length];
        piece.style.animationDelay = `${Math.random() * 8}s`;
        piece.style.animationDuration = `${10 + Math.random() * 12}s`;
        document.body.appendChild(piece);

      });

        if (event.target.closest("button")) audioManager.play("click");
      });

        state.audio.soundEnabled = !state.audio.soundEnabled;
        audioManager.applySettings();
        saveState();

      els.musicToggle.addEventListener("click", () => {
        state.audio.musicEnabled = !state.audio.musicEnabled;
        audioManager.applySettings();
        saveState();
      });

        state.audio.muted = !state.audio.muted;
        audioManager.applySettings();
        saveState();
      });
      els.motionToggle.addEventListener("click", () => {
        state.audio.reduceMotion = !state.audio.reduceMotion;
        audioManager.applySettings();

        saveState();

            student.lessonScore = 0;

            renderScorePanel(id);

          state.scoreMode = input.value;
          saveState();
        });
      });
      document.querySelectorAll('input[name="mvpScoreMode"]').forEach((input) => {
        input.addEventListener("change", () => {
          state.mvpScoreMode = input.value;
          saveState();
          renderScorePanel();
        });
      });

      els.importBtn.addEventListener("click", () => {
        const { names, duplicates } = parseRoster(els.rosterInput.value);
        const oldByName = new Map(state.students.map((student) => [student.name, student]));
        const hasOldScores = names.some((name) => oldByName.has(name) && ((oldByName.get(name).score || 0) !== 0 || (oldByName.get(name).lessonScore || 0) !== 0));
        const keepScores = hasOldScores ? confirm("检测到同名学生已有积分，是否保留同名学生积分？") : false;
        state.students = names.map((name) => {
          const old = oldByName.get(name);
          return keepScores && old
            ? normalizeStudent({ ...old, name, active: true, hidden: false })
            : normalizeStudent({ id: uid(), name, active: true, hidden: false });
        });
        state.drawHistory = [];
        state.groups = [];
        state.classScores = {};
        state.numberHistory = [];
        state.scoreLogs = keepScores ? state.scoreLogs : [];
        state.scoreUndo = [];
        state.recentScoreStudentIds = [];
        state.awardedStudentIds = [];
        if (duplicates.length) {
          els.duplicateNotice.textContent = `发现重复姓名，已保留一份：${duplicates.join("、")}`;
          els.duplicateNotice.classList.add("show");
        } else {
          els.duplicateNotice.classList.remove("show");
          els.duplicateNotice.textContent = "";
        }
        saveState();
        renderAll();
      });

      els.clearBtn.addEventListener("click", () => {
        state.students = [];
        state.drawHistory = [];
        state.groups = [];
        state.classScores = {};
        state.numberHistory = [];
        state.scoreLogs = [];
        state.scoreUndo = [];
        state.recentScoreStudentIds = [];
        state.awardedStudentIds = [];
        els.rosterInput.value = "";
        els.duplicateNotice.classList.remove("show");
        saveState();
        renderAll();
      });

      els.allowRepeat.addEventListener("change", (event) => {
        state.allowRepeat = event.target.checked;
        saveState();
        renderAll();
      });

      els.resetHistoryBtn.addEventListener("click", () => {
        state.drawHistory = [];
        saveState();
        renderAll();
      });

      els.showAllBtn.addEventListener("click", () => {
        state.students.forEach((student) => { student.hidden = false; student.active = true; });
        saveState();
        renderAll();
      });

      els.clearLocalDataBtn.addEventListener("click", () => {
        const ok = confirm("确定清除本机保存的学生名单、积分、点名记录和设置吗？此操作只影响当前浏览器。");
        if (!ok) return;
        audioManager.stopLoop();
        try {
          localStorage.removeItem(STORAGE_KEY);
        } catch (error) {
          console.warn("清除本机数据失败", error);
        }
        window.location.reload();
      });

      els.studentList.addEventListener("click", (event) => {
        if (event.target.closest("[data-open-roster-manager]")) openRosterManager();
        if (event.target.closest("[data-reimport-roster]")) {
          els.rosterInput.focus();
          els.rosterInput.select();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
        if (event.target.closest("[data-clear-roster-inline]")) els.clearBtn.click();
      });

      document.body.addEventListener("click", (event) => {
        const tool = event.target.closest("[data-tool]");
        const quickScore = event.target.closest("[data-result-score]");
        if (quickScore) {
          const box = event.target.closest("#quickScoreBox");
          const studentId = box ? box.dataset.studentId : "";
          const value = quickScore.dataset.resultScore === "custom" ? Number(prompt("请输入加分数", "3")) || 0 : Number(quickScore.dataset.resultScore);
          if (studentId && value) {
            addScore(studentId, value, "抽取结果快捷加分");
            box.classList.add("done");
            box.querySelectorAll("[data-result-score]").forEach((button) => {
              button.disabled = true;
              button.textContent = "已加分";
            });
          }
          return;
        }
        if (tool) handleTool(tool.dataset.tool);
      });

      els.closeModal.addEventListener("click", closeModal);
      els.modal.addEventListener("click", (event) => {
        if (event.target === els.modal) closeModal();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && els.modal.classList.contains("open")) closeModal();
      });
    }

    loadState();
    audioManager.init();
    if (!state.audio.reduceMotion) renderFloatingPieces();
    renderToolCards();
    bindEvents();
    renderAll();
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch((error) => {
          console.warn("离线缓存注册失败", error);
        });
      });
    }
  </script>
</body>
</html>
